name: "🐞 Bug"
description: Algo se dibuja mal o el motor falla.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: que-pasa
    attributes:
      label: ¿Qué pasa?
      description: Qué esperabas y qué ocurrió.
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. npm run build
        2. Abro demo/index.html
        3. ...
  - type: input
    id: entorno
    attributes:
      label: Navegador / SO
      placeholder: "Chrome 140 / Windows 11"
  - type: textarea
    id: consola
    attributes:
      label: Salida de consola o de npm run verify (opcional)
      render: shell
